name: WebSocket Tunnel

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  tunnel:
    if: contains(github.event.head_commit.message, 'WS_TUNNEL_REQUEST')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Install websocat and curl
        run: |
          sudo apt update && sudo apt install -y curl
          curl -L -o websocat https://github.com/vi/websocat/releases/latest/download/websocat.x86_64-unknown-linux-musl
          chmod +x websocat
          sudo mv websocat /usr/local/bin/

      - name: Pick port and publish endpoint
        run: |
          PUBLIC_IP=$(curl -s ifconfig.me)
          PORT=$((20000 + RANDOM % 10000))
          echo "$PUBLIC_IP:$PORT" > ws_endpoint.txt
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add ws_endpoint.txt
          git commit -m "WS_ENDPOINT"
          git push

      - name: Start WebSocket server
        run: |
          PORT=$(cat ws_endpoint.txt | cut -d: -f2)
          # Run websocat as a TCP-to-WebSocket bridge on the chosen port
          # It will listen for WebSocket connections and forward to a local SOCKS proxy (we'll set up a simple one)
          # For simplicity, just create a simple echo server first to test connectivity
          websocat -s 0.0.0.0:$PORT --binary -E &
          sleep 2
          # Keep alive
          sleep 21600
