name: WireGuard Tunnel

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  tunnel:
    if: contains(github.event.head_commit.message, 'TUNNEL_REQUEST')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Install wireguard
        run: sudo apt update && sudo apt install -y wireguard-tools curl

      - name: Generate keys and publish
        run: |
          wg genkey | tee runner_private.key | wg pubkey > runner_pubkey.txt
          PUBLIC_IP=$(curl -s ifconfig.me)
          PORT=$((20000 + RANDOM % 10000))
          echo "$PUBLIC_IP:$PORT" > runner_endpoint.txt
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add runner_endpoint.txt runner_pubkey.txt
          git commit -m "RUNNER_INFO"
          git push

      - name: Wait for client pubkey
        run: |
          while [ ! -f client_pubkey.txt ]; do
            git pull --rebase
            sleep 3
          done

      - name: Start WireGuard and get real client endpoint
        run: |
          PORT=$(cat runner_endpoint.txt | cut -d: -f2)
          sudo ip link add wg0 type wireguard
          sudo ip addr add 10.0.0.1/30 dev wg0
          sudo wg set wg0 private-key runner_private.key listen-port $PORT
          CLIENT_PUBKEY=$(cat client_pubkey.txt)
          # Add client with dummy endpoint (will be updated on first handshake)
          sudo wg set wg0 peer $CLIENT_PUBKEY allowed-ips 10.0.0.2/32 endpoint 127.0.0.1:12345
          sudo ip link set wg0 up

          # Wait for handshake from client, then extract real endpoint
          for i in $(seq 1 20); do
            sleep 3
            ENDPOINT=$(sudo wg show wg0 endpoints | grep "$CLIENT_PUBKEY" | awk '{print $2}')
            if [ -n "$ENDPOINT" ]; then
              sudo wg set wg0 peer $CLIENT_PUBKEY endpoint $ENDPOINT
              echo "$ENDPOINT" > client_endpoint.txt
              git add client_endpoint.txt
              git commit -m "CLIENT_ENDPOINT"
              git push
              break
            fi
          done

      - name: Keep alive
        run: sleep 21600
