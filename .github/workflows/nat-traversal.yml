name: Tunnel Runner

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  run:
    if: contains(github.event.head_commit.message, 'TUNNEL_REQUEST')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install tools
        run: sudo apt update && sudo apt install -y wireguard-tools tcpdump curl

      - name: Get runner IP and pick port
        run: |
          PUBLIC_IP=$(curl -s ifconfig.me)
          PORT=$((20000 + RANDOM % 10000))
          echo "$PUBLIC_IP:$PORT" > runner_endpoint.txt
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add runner_endpoint.txt
          git commit -m "RUNNER_ENDPOINT"
          git push

      - name: Wait for client public key
        run: |
          for i in $(seq 1 60); do
            git pull --rebase
            if [ -f client_pubkey.txt ]; then
              break
            fi
            sleep 3
          done

      - name: Generate runner keys and share
        run: |
          wg genkey | tee runner_private.key | wg pubkey > runner_pubkey.txt
          git add runner_pubkey.txt
          git commit -m "RUNNER_PUBKEY"
          git push

      - name: Start WireGuard and learn client address
        run: |
          PORT=$(cat runner_endpoint.txt | cut -d: -f2)
          sudo ip link add wg0 type wireguard
          sudo ip addr add 10.0.0.1/30 dev wg0
          sudo wg set wg0 private-key runner_private.key listen-port $PORT
          sudo ip link set wg0 up

          # Capture a single UDP packet to learn client's source IP:port
          timeout 20 sudo tcpdump -i any udp port $PORT -c 1 -n -q 2>/dev/null | awk '{print $3}' > client_endpoint.txt || true
          if [ -s client_endpoint.txt ]; then
            CLIENT_EP=$(cat client_endpoint.txt)
            CLIENT_PUBKEY=$(cat client_pubkey.txt)
            sudo wg set wg0 peer $CLIENT_PUBKEY allowed-ips 10.0.0.2/32 endpoint $CLIENT_EP
            git add client_endpoint.txt
            git commit -m "CLIENT_ENDPOINT"
            git push
          fi

      - name: Keep alive for 6 hours
        run: sleep 21600
